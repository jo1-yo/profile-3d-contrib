name: Generate 3D Contribution Graph

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: Generate 3D Contribution Graph
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate 3D Graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        with:
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: |
            {
              "type": "normal",
              "backgroundColor": "#00000000",
              "foregroundColor": "#ffffff",
              "strongColor": "#00ff00",
              "weakColor": "#004400",
              "radarColor": "#00000000",
              "growingAnimation": true,
              "contribColors": ["#004400", "#006600", "#008800", "#00aa00", "#00ff00"],
              "username": "jo1-yo"
            }

      - name: Prepare theme-aware transparent variants
        run: |
          node <<'NODE'
          const fs = require('fs');
          const base = fs.readFileSync('profile-3d-contrib/profile-night-rainbow.svg', 'utf8');

          function clamp(v, min = 0, max = 1) {
            return Math.max(min, Math.min(max, v));
          }

          function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h = 0;
            let s = 0;
            const l = (max + min) / 2;
            const d = max - min;
            if (d !== 0) {
              s = d / (1 - Math.abs(2 * l - 1));
              if (max === r) h = ((g - b) / d) % 6;
              else if (max === g) h = (b - r) / d + 2;
              else h = (r - g) / d + 4;
              h *= 60;
              if (h < 0) h += 360;
            }
            return [h, s, l];
          }

          function hslToRgb(h, s, l) {
            const c = (1 - Math.abs(2 * l - 1)) * s;
            const x = c * (1 - Math.abs((h / 60) % 2 - 1));
            const m = l - c / 2;
            let r = 0, g = 0, b = 0;
            if (h < 60) [r, g, b] = [c, x, 0];
            else if (h < 120) [r, g, b] = [x, c, 0];
            else if (h < 180) [r, g, b] = [0, c, x];
            else if (h < 240) [r, g, b] = [0, x, c];
            else if (h < 300) [r, g, b] = [x, 0, c];
            else [r, g, b] = [c, 0, x];
            return [r, g, b].map(v => Math.round((v + m) * 255));
          }

          function lightenColor(r, g, b, amount) {
            let [h, s, l] = rgbToHsl(r, g, b);
            l = clamp(l + (1 - l) * amount);
            s = clamp(s * 1.04);
            return hslToRgb(h, s, l);
          }

          function recolorAnimatedRgb(svg, amount) {
            return svg.replace(/rgb\((\d+), (\d+), (\d+)\)/g, (_, r, g, b) => {
              const [nr, ng, nb] = lightenColor(Number(r), Number(g), Number(b), amount);
              return `rgb(${nr}, ${ng}, ${nb})`;
            });
          }

          function replaceAll(svg, replacements) {
            for (const [from, to] of replacements) {
              svg = svg.split(from).join(to);
            }
            return svg;
          }

          function buildVariant(theme) {
            const isLight = theme === 'light';
            let svg = base.replace('<rect x="0" y="0" width="1280" height="850" fill="#00000f"></rect>', '');
            svg = recolorAnimatedRgb(svg, isLight ? 0.24 : 0.14);
            svg = svg.replace(
              /<rect stroke="none"/g,
              isLight
                ? '<rect stroke="#6f5b6c" stroke-opacity="0.42" stroke-width="0.45"'
                : '<rect stroke="#211625" stroke-opacity="0.58" stroke-width="0.45"'
            );

            if (isLight) {
              svg = replaceAll(svg, [
                ['fill="#eeeeff"', 'fill="#24292f"'],
                ['fill="#aaaaaa"', 'fill="#57606a"'],
                ['stroke: #aaaaaa', 'stroke: #8c959f'],
                ['stroke="#00000f"', 'stroke="#ffffff"'],
                ['fill="#444444"', 'fill="#A6ADB8"'],
                ['style="fill: #444444;"', 'style="fill: #A6ADB8;"'],
              ]);
            } else {
              svg = replaceAll(svg, [
                ['stroke="#00000f"', 'stroke="#111827"'],
                ['fill="#444444"', 'fill="#A6ADB8"'],
                ['style="fill: #444444;"', 'style="fill: #A6ADB8;"'],
              ]);
            }

            svg = replaceAll(svg, [
              ['#89e051', '#78D8A1'],
              ['#e34c26', '#F47C6B'],
              ['#f1e05a', '#F4D35E'],
              ['#3572A5', '#5B9BD5'],
              ['#663399', '#9B7AE5'],
              ['#8c959f', '#A6ADB8'],
              ['#6b7280', '#A6ADB8'],
              ['rgb(255,200,55)', 'rgb(244,180,73)'],
            ]);

            return svg
              .replace(/>other</g, '>Other: TS/MDX/Vue+<')
              .replace(/<title>other ([^<]+)<\/title>/g, '<title>Other: TypeScript, MDX, Vue, Swift, Dockerfile ($1)</title>');
          }

          fs.writeFileSync('profile-3d-contrib/profile-rainbow-light.svg', buildVariant('light'));
          fs.writeFileSync('profile-3d-contrib/profile-rainbow-dark.svg', buildVariant('dark'));
          NODE
      
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Generated 3D Contribution Graph" && git push)
