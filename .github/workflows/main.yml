name: Generate 3D Contribution Graph

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: Generate 3D Contribution Graph
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate 3D Graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        with:
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: |
            {
              "type": "normal",
              "backgroundColor": "#00000000",
              "foregroundColor": "#ffffff",
              "strongColor": "#00ff00",
              "weakColor": "#004400",
              "radarColor": "#00000000",
              "growingAnimation": true,
              "contribColors": ["#004400", "#006600", "#008800", "#00aa00", "#00ff00"],
              "username": "jo1-yo"
            }

      - name: Prepare theme-aware transparent variants
        run: |
          cp profile-3d-contrib/profile-night-rainbow.svg profile-3d-contrib/profile-rainbow-light.svg
          cp profile-3d-contrib/profile-night-rainbow.svg profile-3d-contrib/profile-rainbow-dark.svg
          perl -0pi -e 's/<rect x="0" y="0" width="1280" height="850" fill="#00000f"><\/rect>//' profile-3d-contrib/profile-rainbow-dark.svg profile-3d-contrib/profile-rainbow-light.svg
          perl -0pi -e 's/rgb\((\d+), (\d+), (\d+)\)/sprintf("rgb(%d, %d, %d)", int($1*0.62+255*0.38+0.5), int($2*0.62+255*0.38+0.5), int($3*0.62+255*0.38+0.5))/ge' profile-3d-contrib/profile-rainbow-light.svg
          perl -0pi -e 's/rgb\((\d+), (\d+), (\d+)\)/sprintf("rgb(%d, %d, %d)", int($1*0.76+255*0.24+0.5), int($2*0.76+255*0.24+0.5), int($3*0.76+255*0.24+0.5))/ge' profile-3d-contrib/profile-rainbow-dark.svg
          perl -0pi -e 's/<rect stroke="none"/<rect stroke="#eadff4" stroke-width="0.75"/g' profile-3d-contrib/profile-rainbow-light.svg
          perl -0pi -e 's/<rect stroke="none"/<rect stroke="#24162d" stroke-width="0.75"/g' profile-3d-contrib/profile-rainbow-dark.svg
          perl -0pi -e 's/fill="#eeeeff"/fill="#24292f"/g; s/fill="#aaaaaa"/fill="#57606a"/g; s/stroke: #aaaaaa/stroke: #8c959f/g; s/stroke="#00000f"/stroke="#f6f0fa"/g; s/fill="#444444"/fill="#8c959f"/g; s/style="fill: #444444;"/style="fill: #8c959f;"/g' profile-3d-contrib/profile-rainbow-light.svg
          perl -0pi -e 's/stroke="#00000f"/stroke="#111827"/g; s/fill="#444444"/fill="#6b7280"/g; s/style="fill: #444444;"/style="fill: #6b7280;"/g' profile-3d-contrib/profile-rainbow-dark.svg
      
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Generated 3D Contribution Graph" && git push)
